# HOW THIS WORKS
#
# - Uses a custom systemd-enabled image `imagebuilder-u2404` prepared prior to using in compose
# - Starts systemd as PID 1 via entrypoint /usr/sbin/init
# - Mounts /sys/fs/cgroup read-write so systemd can create cgroup scopes
# - Adds tmpfs for /run and /run/lock so systemd can manage runtime state
# - Uses privileged mode to allow containerized systemd to boot cleanly

services:

###########################################################
#########       IMAGE BUILDER
###########################################################
#
# imagebuilder
#  
  imagebuilder:
    image: imagebuilder-u2404
    deploy:
      resources:
        limits:
          cpus: '0.50'     # Limit to 50% of a single CPU core
          memory: 512M     # Limit to 512 Megabytes of RAM
        reservations:
            cpus: '0.25'
            memory: 128M          
    networks:
      net1:
        priority: 10
        ipv4_address: "172.27.1.10"
    hostname: imagebuilder
    container_name: imagebuilder
    entrypoint: ["/usr/sbin/init"]
    tty: true
    stdin_open: true
    privileged: true 
    restart: on-failure
    volumes:
      - "./:/hostdata"
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock      


###########################################################
#########       NETWORK
###########################################################
networks:
  net1:
    ipam: 
      driver: default
      config:
        - subnet: "172.27.0.0/16"
          ip_range: "172.27.1.0/24"
